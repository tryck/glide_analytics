<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glide Analytics | Client Licensing Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #7d09ff;
            --secondary: #DE3163;
            --bg: #0f172a;
            --card-bg: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: white;
            min-height: 100vh;
            background-image: radial-gradient(circle at 10% 20%, rgba(125, 9, 255, 0.1) 0%, transparent 20%),
                              radial-gradient(circle at 90% 80%, rgba(222, 49, 99, 0.1) 0%, transparent 20%);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .logo h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn {
            background: linear-gradient(to right, var(--primary), var(--secondary));
            color: white;
            padding: 12px 24px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s, opacity 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn:hover {
            transform: translateY(-2px);
            opacity: 0.9;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 24px;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 24px;
            position: relative;
            overflow: hidden;
            transition: transform 0.3s;
        }

        .card:hover {
            transform: scale(1.02);
            border-color: var(--primary);
        }

        .card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(to right, var(--primary), var(--secondary));
        }

        .card h3 {
            font-size: 22px;
            margin-bottom: 8px;
        }

        .client-tag {
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 20px;
            display: block;
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 20px;
        }

        .stat-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 12px;
            border-radius: 12px;
        }

        .stat-label {
            font-size: 12px;
            color: #94a3b8;
            display: block;
            margin-bottom: 4px;
        }

        .stat-value {
            font-size: 18px;
            font-weight: 600;
        }

        .license-status {
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            display: inline-block;
        }

        .status-active { background: rgba(34, 197, 94, 0.2); color: #4ade80; }
        .status-locked { background: rgba(239, 68, 68, 0.2); color: #f87171; }
        .status-offline { background: rgba(148, 163, 184, 0.2); color: #94a3b8; }

        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 32px;
            width: 100%;
            max-width: 500px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #94a3b8;
            font-size: 14px;
        }

        .form-control {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            padding: 12px;
            border-radius: 10px;
            color: white;
            outline: none;
        }

        .form-control:focus {
            border-color: var(--primary);
        }

        .flex { display: flex; gap: 10px; justify-content: flex-end; }
        
        .btn-ghost {
            background: transparent;
            border: 1px solid var(--border);
            color: #94a3b8;
            padding: 12px 24px;
            border-radius: 12px;
            cursor: pointer;
        }

        .delete-btn {
            position: absolute;
            top: 24px;
            right: 24px;
            color: #94a3b8;
            cursor: pointer;
            transition: color 0.2s;
        }

        .delete-btn:hover { color: var(--secondary); }

    </style>
</head>
<body>
    <div class="container" id="app">
        <header>
            <div class="logo">
                <h1>Glide Analytics</h1>
            </div>
            <button class="btn" onclick="toggleModal(true)">
                <i class="fa fa-plus"></i> Add Client
            </button>
        </header>

        <div class="grid" id="clientGrid">
            <!-- Client Cards will appear here -->
        </div>
    </div>

    <!-- Add Client Modal -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <h2 style="margin-bottom: 24px;">New Client Configuration</h2>
            <form id="clientForm">
                <div class="form-group">
                    <label>Client Name</label>
                    <input type="text" class="form-control" name="name" placeholder="e.g. Digital Glide" required>
                </div>
                <div class="form-group">
                    <label>System (e.g., CRM)</label>
                    <input type="text" class="form-control" name="system" placeholder="CRM" required>
                </div>
                <hr style="margin-bottom: 20px; opacity: 0.1;">
                <h4 style="margin-bottom: 16px; color: var(--primary);">Database Connection</h4>
                <div class="form-group">
                    <label>DB Host/URL</label>
                    <input type="text" class="form-control" name="db_host" placeholder="localhost" required>
                </div>
                <div class="form-group">
                    <label>DB Name</label>
                    <input type="text" class="form-control" name="db_name" required>
                </div>
                <div class="form-group">
                    <label>DB User</label>
                    <input type="text" class="form-control" name="db_user" required>
                </div>
                <div class="form-group">
                    <label>DB Password</label>
                    <input type="password" class="form-control" name="db_password">
                </div>
                <div class="flex">
                    <button type="button" class="btn-ghost" onclick="toggleModal(false)">Cancel</button>
                    <button type="submit" class="btn">Register Client</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3001/api';

        async function fetchAnalysis() {
            const grid = document.getElementById('clientGrid');
            grid.innerHTML = '<p>Analyzing systems... please wait.</p>';
            
            try {
                const response = await fetch(`${API_URL}/analysis`);
                const data = await response.json();
                
                grid.innerHTML = '';
                data.forEach(client => {
                    const statusClass = client.status === 'Online' ? 
                        (client.license === 'Locked' ? 'status-locked' : 'status-active') : 
                        'status-offline';
                    
                    const card = `
                        <div class="card">
                            <i class="fa fa-trash delete-btn" onclick="deleteClient('${client.client_id}')"></i>
                            <h3>${client.name}</h3>
                            <span class="client-tag">${client.system}</span>
                            
                            <div class="stats">
                                <div class="stat-item">
                                    <span class="stat-label">Staff</span>
                                    <span class="stat-value">${client.staff || 0}</span>
                                </div>
                                <div class="stat-item">
                                    <span class="stat-label">Accounts</span>
                                    <span class="stat-value">${client.clients || 0}</span>
                                </div>
                            </div>

                            <div class="license-status ${statusClass}">
                                <i class="fa ${client.status === 'Online' ? 'fa-check-circle' : 'fa-times-circle'}"></i> 
                                ${client.status === 'Online' ? (client.license || 'Active') : 'Offline'}
                            </div>
                        </div>
                    `;
                    grid.innerHTML += card;
                });
            } catch (error) {
                grid.innerHTML = '<p style="color:red">Failed to connect to analytics server.</p>';
            }
        }

        function toggleModal(show) {
            document.getElementById('modalOverlay').style.display = show ? 'flex' : 'none';
        }

        document.getElementById('clientForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const clientData = Object.fromEntries(formData);
            
            try {
                await fetch(`${API_URL}/clients`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(clientData)
                });
                toggleModal(false);
                e.target.reset();
                fetchAnalysis();
            } catch (error) {
                alert('Failed to add client');
            }
        });

        async function deleteClient(id) {
            if (!confirm('Remove this client from tracking?')) return;
            try {
                await fetch(`${API_URL}/clients/${id}`, { method: 'DELETE' });
                fetchAnalysis();
            } catch (error) {
                alert('Failed to delete');
            }
        }

        // Initial load
        fetchAnalysis();
        // Refresh every 30s
        setInterval(fetchAnalysis, 30000);

    </script>
</body>
</html>
