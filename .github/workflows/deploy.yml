name: Deploy Glide Analytics

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v2

    - name: Deploy to Server via SSH
      uses: appleboy/ssh-action@master
      with:
        host: 13.202.184.29
        username: ubuntu
        key: ${{ secrets.SERVER_SSH_KEY }}
        script: |
          cd /var/www/html/glide_analytics
          git pull origin main
          
          # Root Setup
          npm install
          
          # Server side
          cd server
          npm install
          pm2 restart glide-analytics-server || pm2 start index.js --name glide-analytics-server
          
          # Client side
          cd ../client
          npm install
          npm run build
