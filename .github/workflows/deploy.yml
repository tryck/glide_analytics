name: Deploy to Production

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Deploy using SSH
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ubuntu
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          cd /var/www/html/glide_analytics
          git pull origin main

          # 1. Update and Build the Frontend (React)
          cd client
          npm install
          npm run build

          # 2. Update and Restart the Backend
          cd ../server
          npm install
          # Restart the PM2 process - change 'all' to your specific server process name if needed
          pm2 restart all || node index.js &
